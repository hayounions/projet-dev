<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réaction Rapide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Réaction Rapide</h1>
        <div class="game-info">
            <p id="status">Cliquez "Démarrer" pour commencer</p>

        <p class="instructions">Cliquez dès que la couleur change!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
